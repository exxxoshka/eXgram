<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exogram · Telegram Clone</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        /* Стили как в предыдущей версии, но оптимизированные */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --bg-dark: #0e1621;
            --bg-sidebar-dark: #17212b;
            --bg-header-dark: #1e2b36;
            --bg-bubble-incoming-dark: #17212b;
            --bg-bubble-outgoing-dark: #2b3947;
            --text-primary-dark: #ffffff;
            --text-secondary-dark: #6e7b8a;
            --accent-blue: #5f9cea;
            
            --bg-light: #e7ebf0;
            --bg-sidebar-light: #f0f2f5;
            --bg-header-light: #ffffff;
            --bg-bubble-incoming-light: #ffffff;
            --bg-bubble-outgoing-light: #d1f0ff;
            --text-primary-light: #000000;
            --text-secondary-light: #5e6f8d;
        }

        body.dark-theme {
            background: var(--bg-dark);
            color: var(--text-primary-dark);
        }

        body.light-theme {
            background: var(--bg-light);
            color: var(--text-primary-light);
        }

        .exogram-container {
            width: 100%;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Темы */
        body.dark-theme .exogram-container { background: var(--bg-sidebar-dark); }
        body.light-theme .exogram-container { background: var(--bg-sidebar-light); }

        body.dark-theme .chats-sidebar { background: var(--bg-sidebar-dark); border-right-color: #0f1a24; }
        body.light-theme .chats-sidebar { background: var(--bg-sidebar-light); border-right-color: #d3d9e1; }

        body.dark-theme .sidebar-header,
        body.dark-theme .profile-section,
        body.dark-theme .chat-header,
        body.dark-theme .input-area {
            background: var(--bg-header-dark);
            border-bottom-color: #0f1a24;
        }

        body.light-theme .sidebar-header,
        body.light-theme .profile-section,
        body.light-theme .chat-header,
        body.light-theme .input-area {
            background: var(--bg-header-light);
            border-bottom-color: #d3d9e1;
        }

        body.dark-theme .messages-area { background: var(--bg-dark); }
        body.light-theme .messages-area { background: var(--bg-light); }

        body.dark-theme .incoming .bubble { background: var(--bg-bubble-incoming-dark); color: var(--text-primary-dark); }
        body.light-theme .incoming .bubble { background: var(--bg-bubble-incoming-light); color: var(--text-primary-light); }

        body.dark-theme .outgoing .bubble { background: var(--bg-bubble-outgoing-dark); color: var(--text-primary-dark); }
        body.light-theme .outgoing .bubble { background: var(--bg-bubble-outgoing-light); color: var(--text-primary-light); }

        body.dark-theme .message-sender { color: var(--accent-blue) !important; }
        body.light-theme .message-sender { color: #2a5b8c !important; }

        body.dark-theme .message-footer,
        body.dark-theme .chat-header-status,
        body.dark-theme .profile-status,
        body.dark-theme .chat-last {
            color: var(--text-secondary-dark) !important;
        }

        body.light-theme .message-footer,
        body.light-theme .chat-header-status,
        body.light-theme .profile-status,
        body.light-theme .chat-last {
            color: var(--text-secondary-light) !important;
        }

        body.dark-theme .input-wrapper { background: var(--bg-header-dark); }
        body.light-theme .input-wrapper { background: var(--bg-sidebar-light); }

        body.dark-theme #messageInput { color: var(--text-primary-dark); }
        body.light-theme #messageInput { color: var(--text-primary-light); }

        /* Основные стили */
        .chats-sidebar {
            width: 340px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid;
        }

        .sidebar-header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-header h3 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #5f9cea, #9f7aea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-icons {
            display: flex;
            gap: 18px;
            font-size: 22px;
            cursor: pointer;
        }

        .profile-section {
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid;
        }

        .profile-section:hover {
            background: rgba(95, 156, 234, 0.1);
        }

        .profile-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2e7eb0, #4e9ad0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            color: white;
            overflow: hidden;
            position: relative;
            flex-shrink: 0;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-weight: 600;
            font-size: 16px;
        }

        .profile-status {
            font-size: 13px;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid;
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
        }

        .chat-item:hover {
            background: rgba(95, 156, 234, 0.1);
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2e7eb0, #4e9ad0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            overflow: hidden;
            flex-shrink: 0;
        }

        .chat-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .chat-last {
            font-size: 13px;
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid;
        }

        .chat-header-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2e7eb0, #4e9ad0);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .chat-header-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .chat-header-status {
            font-size: 13px;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px 40px;
        }

        .message-row {
            display: flex;
            margin-bottom: 16px;
            align-items: flex-end;
            gap: 8px;
        }

        .message-row.outgoing {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2e7eb0, #4e9ad0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: white;
            overflow: hidden;
            flex-shrink: 0;
            margin-bottom: 20px;
        }

        .message-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .message-content {
            max-width: 60%;
            position: relative;
        }

        .bubble {
            padding: 10px 14px 8px 14px;
            border-radius: 14px;
            word-wrap: break-word;
        }

        .incoming .bubble {
            border-top-left-radius: 4px;
        }

        .outgoing .bubble {
            border-top-right-radius: 4px;
        }

        .message-sender {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            cursor: pointer;
        }

        .message-text {
            font-size: 15px;
            line-height: 1.4;
        }

        .message-footer {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 6px;
            margin-top: 4px;
            font-size: 11px;
        }

        .input-area {
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-top: 1px solid;
        }

        .attach-btn {
            font-size: 26px;
            transform: rotate(45deg);
            cursor: pointer;
        }

        .input-wrapper {
            flex: 1;
            border-radius: 30px;
            padding: 10px 18px;
        }

        #messageInput {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            font-size: 15px;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #5f9cea, #9f7aea);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .auth-card {
            background: var(--bg-sidebar-dark);
            border-radius: 24px;
            padding: 32px;
            width: 400px;
            color: white;
        }

        .auth-card h2 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 32px;
            background: linear-gradient(135deg, #5f9cea, #9f7aea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-tabs {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            border-bottom: 1px solid #2b3947;
            padding-bottom: 16px;
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            cursor: pointer;
            border-radius: 12px;
            transition: background 0.2s;
            font-weight: 600;
        }

        .auth-tab.active {
            background: rgba(95, 156, 234, 0.3);
        }

        .auth-input {
            width: 100%;
            padding: 16px;
            background: #1e2b36;
            border: 1px solid #2b3947;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            margin-bottom: 16px;
            outline: none;
        }

        .auth-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #5f9cea, #9f7aea);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }

        .error-message {
            color: #ff6b6b;
            text-align: center;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .chats-sidebar {
                width: 100px;
            }
            .chat-info {
                display: none;
            }
        }
    </style>
</head>
<body class="dark-theme">
    <!-- Модалка авторизации -->
    <div id="authModal" class="auth-modal">
        <div class="auth-card">
            <h2>✨ Exogram</h2>
            
            <div class="auth-tabs">
                <div class="auth-tab active" id="loginTab" onclick="switchTab('login')">Вход</div>
                <div class="auth-tab" id="registerTab" onclick="switchTab('register')">Регистрация</div>
            </div>

            <div id="loginForm">
                <input type="email" id="loginEmail" class="auth-input" placeholder="Email" value="test@test.com">
                <input type="password" id="loginPassword" class="auth-input" placeholder="Пароль" value="123456">
                <button class="auth-btn" onclick="handleLogin()">Войти</button>
            </div>

            <div id="registerForm" style="display: none;">
                <input type="text" id="regName" class="auth-input" placeholder="Имя">
                <input type="email" id="regEmail" class="auth-input" placeholder="Email">
                <input type="password" id="regPassword" class="auth-input" placeholder="Пароль">
                <button class="auth-btn" onclick="handleRegister()">Создать</button>
            </div>

            <div id="authError" class="error-message"></div>
        </div>
    </div>

    <!-- Основной чат -->
    <div class="exogram-container" id="chatContainer" style="display: none;">
        <!-- Сайдбар -->
        <div class="chats-sidebar">
            <div class="sidebar-header">
                <h3>Exogram</h3>
                <div class="header-icons">
                    <span id="themeToggle" onclick="toggleTheme()">🌙</span>
                </div>
            </div>
            
            <!-- Профиль -->
            <div class="profile-section" id="profileSection">
                <div class="profile-avatar" id="profileAvatar">
                    <span id="profileAvatarText">U</span>
                </div>
                <div class="profile-info">
                    <div class="profile-name" id="profileName">Загрузка...</div>
                    <div class="profile-status">Онлайн</div>
                </div>
            </div>

            <div class="chat-list" id="chatList">
                <div class="chat-item">
                    <div class="chat-avatar">👥</div>
                    <div class="chat-info">
                        <div class="chat-name">Общий чат</div>
                        <div class="chat-last">Все участники</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Чат -->
        <div class="chat-main">
            <div class="chat-header">
                <div class="chat-header-avatar">👥</div>
                <div class="chat-header-info">
                    <div class="chat-header-title">Общий чат</div>
                    <div class="chat-header-status">онлайн</div>
                </div>
            </div>

            <div class="messages-area" id="messagesArea">
                <div style="text-align: center; color: var(--text-secondary-dark); margin-top: 20px;">
                    Добро пожаловать в Exogram! 👋
                </div>
            </div>

            <div class="input-area">
                <div class="attach-btn" onclick="alert('Функция в разработке')">📎</div>
                <div class="input-wrapper">
                    <input type="text" id="messageInput" placeholder="Сообщение" disabled>
                </div>
                <button class="send-btn" id="sendButton" disabled onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <script>
        // Firebase конфиг - ВАШИ ДАННЫЕ
        const firebaseConfig = {
            apiKey: "AIzaSyC52uzvut9hJ4Z_hGA7K8HbM9zdcsRfSLw",
            authDomain: "chat-6ba8e.firebaseapp.com",
            projectId: "chat-6ba8e",
            storageBucket: "chat-6ba8e.firebasestorage.app",
            messagingSenderId: "689091987996",
            appId: "1:689091987996:web:dee2edbb65d87f504a6dd9",
            measurementId: "G-THM716CP12"
        };

        // Инициализация Firebase
        try {
            firebase.initializeApp(firebaseConfig);
            console.log('Firebase initialized');
        } catch (e) {
            console.error('Firebase init error:', e);
        }

        const db = firebase.firestore();
        const auth = firebase.auth();

        let currentUser = null;
        let unsubscribeMessages = null;
        let currentTheme = 'dark';

        // Тема
        window.toggleTheme = function() {
            const body = document.body;
            const themeToggle = document.getElementById('themeToggle');
            
            if (currentTheme === 'dark') {
                body.classList.remove('dark-theme');
                body.classList.add('light-theme');
                themeToggle.textContent = '☀️';
                currentTheme = 'light';
            } else {
                body.classList.remove('light-theme');
                body.classList.add('dark-theme');
                themeToggle.textContent = '🌙';
                currentTheme = 'dark';
            }
            localStorage.setItem('exogram_theme', currentTheme);
        };

        // Загрузка темы
        const savedTheme = localStorage.getItem('exogram_theme');
        if (savedTheme) {
            currentTheme = savedTheme;
            document.body.classList.add(savedTheme + '-theme');
            document.getElementById('themeToggle').textContent = savedTheme === 'dark' ? '🌙' : '☀️';
        }

        // Функции авторизации
        window.switchTab = function(tab) {
            if (tab === 'login') {
                document.getElementById('loginTab').classList.add('active');
                document.getElementById('registerTab').classList.remove('active');
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
            } else {
                document.getElementById('registerTab').classList.add('active');
                document.getElementById('loginTab').classList.remove('active');
                document.getElementById('registerForm').style.display = 'block';
                document.getElementById('loginForm').style.display = 'none';
            }
        };

        window.handleRegister = async function() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            if (!name || !email || !password) {
                document.getElementById('authError').textContent = 'Заполните все поля';
                return;
            }

            try {
                const result = await auth.createUserWithEmailAndPassword(email, password);
                await result.user.updateProfile({ displayName: name });
                
                await db.collection('users').doc(result.user.uid).set({
                    name: name,
                    email: email,
                    avatar: '',
                    createdAt: new Date()
                });

                currentUser = result.user;
                hideAuthModal();
                initChat();
            } catch (error) {
                document.getElementById('authError').textContent = error.message;
            }
        };

        window.handleLogin = async function() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const result = await auth.signInWithEmailAndPassword(email, password);
                currentUser = result.user;
                hideAuthModal();
                initChat();
            } catch (error) {
                document.getElementById('authError').textContent = 'Неверный email или пароль';
            }
        };

        // Инициализация чата
        function initChat() {
            document.getElementById('messageInput').disabled = false;
            document.getElementById('sendButton').disabled = false;
            document.getElementById('profileName').textContent = currentUser.displayName || 'User';
        }

        window.sendMessage = function() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text || !currentUser) return;

            // Временно добавляем сообщение локально
            const messagesArea = document.getElementById('messagesArea');
            const messageRow = document.createElement('div');
            messageRow.className = 'message-row outgoing';
            
            messageRow.innerHTML = `
                <div class="message-content">
                    <div class="bubble">
                        <div class="message-text">${text}</div>
                        <div class="message-footer">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})} ✓✓</div>
                    </div>
                </div>
            `;
            
            messagesArea.appendChild(messageRow);
            messagesArea.scrollTop = messagesArea.scrollHeight;
            input.value = '';
        };

        function hideAuthModal() {
            document.getElementById('authModal').style.display = 'none';
            document.getElementById('chatContainer').style.display = 'flex';
        }

        // Обработчики
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        // Проверка авторизации
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                hideAuthModal();
                initChat();
            }
        });

        // Для демо - показываем чат сразу (если не хотите ждать авторизацию)
        setTimeout(() => {
            if (!currentUser) {
                // Демо-режим
                document.getElementById('authModal').style.display = 'none';
                document.getElementById('chatContainer').style.display = 'flex';
                document.getElementById('profileName').textContent = 'Гость';
                document.getElementById('messageInput').disabled = false;
                document.getElementById('sendButton').disabled = false;
            }
        }, 1000);
    </script>
</body>
</html>
