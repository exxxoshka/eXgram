<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exogram · Полная версия</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }

        /* Светлая тема */
        body.light-theme {
            background: #e7ebf0;
        }
        body.light-theme,
        body.light-theme * {
            color: #000000 !important;
        }
        body.light-theme .exogram-container {
            background: #ffffff;
        }
        body.light-theme .chats-sidebar {
            background: #f0f2f5;
            border-right-color: #d3d9e1;
        }
        body.light-theme .sidebar-header,
        body.light-theme .profile-section,
        body.light-theme .chat-header,
        body.light-theme .input-area {
            background: #ffffff;
            border-bottom-color: #d3d9e1;
        }
        body.light-theme .chat-item {
            border-bottom-color: #e9ecf0;
        }
        body.light-theme .chat-item:hover {
            background: #e4e7eb;
        }
        body.light-theme .chat-item.active {
            background: #d1d9e6;
        }
        body.light-theme .messages-area {
            background: #e7ebf0;
        }
        body.light-theme .incoming .bubble {
            background: #ffffff;
            color: #000000 !important;
        }
        body.light-theme .outgoing .bubble {
            background: #d1f0ff;
            color: #000000 !important;
        }
        body.light-theme .message-sender {
            color: #2a5b8c !important;
        }
        body.light-theme .message-footer,
        body.light-theme .chat-header-status,
        body.light-theme .profile-status,
        body.light-theme .chat-last {
            color: #5e6f8d !important;
        }
        body.light-theme .input-wrapper {
            background: #f0f2f5;
        }
        body.light-theme #messageInput {
            color: #000000 !important;
        }
        body.light-theme #messageInput::placeholder {
            color: #5e6f8d;
        }
        body.light-theme .auth-card,
        body.light-theme .avatar-card,
        body.light-theme .profile-menu-card {
            background: #ffffff;
            color: #000000 !important;
        }
        body.light-theme .auth-input,
        body.light-theme .profile-input {
            background: #f0f2f5;
            border-color: #d3d9e1;
            color: #000000 !important;
        }
        body.light-theme .auth-input::placeholder,
        body.light-theme .profile-input::placeholder {
            color: #5e6f8d;
        }
        body.light-theme .auth-tab {
            color: #000000 !important;
        }
        body.light-theme .auth-tab.active {
            background: rgba(95, 156, 234, 0.3);
        }
        body.light-theme .header-icons span {
            color: #000000 !important;
        }
        body.light-theme .chat-header-title {
            color: #000000 !important;
        }
        body.light-theme .sidebar-header h3 {
            color: transparent !important;
        }
        body.light-theme .profile-name {
            color: #000000 !important;
        }
        body.light-theme .chat-name {
            color: #000000 !important;
        }
        body.light-theme .attach-btn {
            color: #5e6f8d !important;
        }
        body.light-theme .send-btn {
            color: white !important;
        }

        /* Темная тема */
        body.dark-theme {
            background: #0e1621;
        }
        body.dark-theme,
        body.dark-theme * {
            color: #ffffff !important;
        }
        body.dark-theme .exogram-container {
            background: #17212b;
        }
        body.dark-theme .chats-sidebar {
            background: #17212b;
            border-right-color: #0f1a24;
        }
        body.dark-theme .sidebar-header,
        body.dark-theme .profile-section,
        body.dark-theme .chat-header,
        body.dark-theme .input-area {
            background: #1e2b36;
            border-bottom-color: #0f1a24;
        }
        body.dark-theme .chat-item {
            border-bottom-color: #1e2b36;
        }
        body.dark-theme .chat-item:hover {
            background: #1e2b36;
        }
        body.dark-theme .chat-item.active {
            background: #2b3947;
        }
        body.dark-theme .messages-area {
            background: #0e1621;
        }
        body.dark-theme .incoming .bubble {
            background: #17212b;
            color: #ffffff !important;
        }
        body.dark-theme .outgoing .bubble {
            background: #2b3947;
            color: #ffffff !important;
        }
        body.dark-theme .message-sender {
            color: #5f9cea !important;
        }
        body.dark-theme .message-footer,
        body.dark-theme .chat-header-status,
        body.dark-theme .profile-status,
        body.dark-theme .chat-last {
            color: #6e7b8a !important;
        }
        body.dark-theme .input-wrapper {
            background: #1e2b36;
        }
        body.dark-theme #messageInput {
            color: #ffffff !important;
        }
        body.dark-theme #messageInput::placeholder {
            color: #6e7b8a;
        }
        body.dark-theme .auth-card,
        body.dark-theme .avatar-card,
        body.dark-theme .profile-menu-card {
            background: #17212b;
            color: #ffffff !important;
        }
        body.dark-theme .auth-input,
        body.dark-theme .profile-input {
            background: #1e2b36;
            border-color: #2b3947;
            color: #ffffff !important;
        }
        body.dark-theme .auth-input::placeholder,
        body.dark-theme .profile-input::placeholder {
            color: #6e7b8a;
        }
        body.dark-theme .auth-tab {
            color: #ffffff !important;
        }
        body.dark-theme .auth-tab.active {
            background: rgba(95, 156, 234, 0.3);
        }
        body.dark-theme .header-icons span {
            color: #ffffff !important;
        }
        body.dark-theme .chat-header-title {
            color: #ffffff !important;
        }
        body.dark-theme .sidebar-header h3 {
            color: transparent !important;
        }
        body.dark-theme .profile-name {
            color: #ffffff !important;
        }
        body.dark-theme .chat-name {
            color: #ffffff !important;
        }
        body.dark-theme .attach-btn {
            color: #6e7b8a !important;
        }
        body.dark-theme .send-btn {
            color: white !important;
        }

        .exogram-container {
            width: 100%;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Сайдбар */
        .chats-sidebar {
            width: 340px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid;
        }

        .sidebar-header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-header h3 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #5f9cea, #9f7aea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-icons {
            display: flex;
            gap: 18px;
            font-size: 22px;
            cursor: pointer;
        }

        .header-icons span {
            cursor: pointer;
        }

        .profile-section {
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid;
            position: relative;
        }

        .profile-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2e7eb0, #4e9ad0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            color: white;
            overflow: hidden;
            position: relative;
            flex-shrink: 0;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-avatar span {
            color: white !important;
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-weight: 600;
            font-size: 16px;
        }

        .profile-status {
            font-size: 13px;
        }

        .profile-menu {
            position: absolute;
            top: 70px;
            right: 10px;
            width: 280px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: none;
            z-index: 1000;
        }

        .profile-menu.show {
            display: block;
        }

        .profile-menu-card {
            padding: 20px;
            border-radius: 16px;
        }

        .profile-menu-item {
            padding: 15px;
            cursor: pointer;
            border-radius: 12px;
            transition: background 0.2s;
            margin-bottom: 5px;
        }

        .profile-menu-item:hover {
            background: rgba(95, 156, 234, 0.2);
        }

        .profile-menu-item i {
            margin-right: 10px;
            font-size: 18px;
        }

        .profile-input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid;
            margin-bottom: 10px;
            outline: none;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid;
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
        }

        .chat-item:hover .chat-item-menu-btn {
            opacity: 1;
        }

        .chat-item-menu-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
            background: rgba(0,0,0,0.3);
        }

        .chat-item-menu-btn span {
            color: white !important;
        }

        .chat-item-menu {
            position: absolute;
            right: 10px;
            top: 40px;
            width: 200px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            display: none;
            z-index: 100;
        }

        .chat-item-menu.show {
            display: block;
        }

        .chat-item-menu .menu-item {
            padding: 12px 15px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-item-menu .menu-item:hover {
            background: rgba(95, 156, 234, 0.2);
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2e7eb0, #4e9ad0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            overflow: hidden;
            position: relative;
            flex-shrink: 0;
            cursor: pointer;
        }

        .chat-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .chat-avatar span {
            color: white !important;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .chat-last {
            font-size: 13px;
        }

        /* Основной чат */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid;
        }

        .chat-header-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2e7eb0, #4e9ad0);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
        }

        .chat-header-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .chat-header-avatar span {
            color: white !important;
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .chat-header-status {
            font-size: 13px;
        }

        .chat-header-icons {
            display: flex;
            gap: 24px;
            font-size: 22px;
            cursor: pointer;
        }

        .chat-header-icons span {
            cursor: pointer;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px 40px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60"><circle cx="30" cy="30" r="1" fill="%232b3947" opacity="0.3"/></svg>');
        }

        .message-row {
            display: flex;
            margin-bottom: 16px;
            position: relative;
            align-items: flex-end;
            gap: 8px;
        }

        .message-row.outgoing {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2e7eb0, #4e9ad0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            overflow: hidden;
            flex-shrink: 0;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .message-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .message-avatar span {
            color: white !important;
        }

        .message-content {
            max-width: 60%;
            position: relative;
        }

        .message-row:hover .message-actions-btn {
            opacity: 1;
        }

        .message-actions-btn {
            position: absolute;
            right: 0;
            top: -25px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
            background: rgba(0,0,0,0.3);
            z-index: 5;
        }

        .message-actions-btn span {
            color: white !important;
        }

        .message-actions-menu {
            position: absolute;
            right: 0;
            top: -80px;
            width: 150px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            display: none;
            z-index: 10;
        }

        .message-actions-menu.show {
            display: block;
        }

        .message-actions-menu .menu-item {
            padding: 10px 15px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .message-actions-menu .menu-item:hover {
            background: rgba(95, 156, 234, 0.2);
        }

        .bubble {
            padding: 10px 14px 8px 14px;
            border-radius: 14px;
            word-wrap: break-word;
        }

        .incoming .bubble {
            border-top-left-radius: 4px;
        }

        .outgoing .bubble {
            border-top-right-radius: 4px;
        }

        .message-sender {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            cursor: pointer;
        }

        .message-text {
            font-size: 15px;
            line-height: 1.4;
        }

        .message-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 5px;
        }

        .message-footer {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 6px;
            margin-top: 4px;
            font-size: 11px;
        }

        .input-area {
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-top: 1px solid;
        }

        .attach-btn {
            font-size: 26px;
            transform: rotate(45deg);
            cursor: pointer;
            position: relative;
        }

        .attach-menu {
            position: absolute;
            bottom: 70px;
            left: 20px;
            border-radius: 16px;
            padding: 8px;
            display: none;
            flex-direction: column;
            gap: 4px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            z-index: 100;
            border: 1px solid;
        }

        body.light-theme .attach-menu {
            background: #ffffff;
            border-color: #d3d9e1;
        }

        body.dark-theme .attach-menu {
            background: #17212b;
            border-color: #2b3947;
        }

        .attach-menu.show {
            display: flex;
        }

        .attach-option {
            padding: 12px 24px;
            cursor: pointer;
            border-radius: 12px;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .attach-option:hover {
            background: rgba(95, 156, 234, 0.2);
        }

        .input-wrapper {
            flex: 1;
            border-radius: 30px;
            padding: 10px 18px;
            display: flex;
            align-items: center;
        }

        #messageInput {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-size: 15px;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #5f9cea;
            border: none;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn span {
            color: white !important;
        }

        /* Модалки */
        .auth-modal, .avatar-modal, .photo-viewer {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .auth-card, .avatar-card {
            border-radius: 24px;
            padding: 32px;
            width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .auth-tabs {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            border-bottom: 1px solid;
            padding-bottom: 16px;
        }

        body.light-theme .auth-tabs {
            border-bottom-color: #d3d9e1;
        }

        body.dark-theme .auth-tabs {
            border-bottom-color: #2b3947;
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            cursor: pointer;
            border-radius: 12px;
            transition: background 0.2s;
            font-weight: 600;
        }

        .auth-tab.active {
            background: rgba(95, 156, 234, 0.3);
        }

        .auth-input {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: 1px solid;
            margin-bottom: 16px;
            outline: none;
        }

        .auth-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #5f9cea, #9f7aea);
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }

        .auth-btn span {
            color: white !important;
        }

        .avatar-preview {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 20px auto;
            overflow: hidden;
            border: 3px solid #5f9cea;
            cursor: pointer;
        }

        .avatar-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-input {
            display: none;
        }

        .avatar-label {
            display: block;
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            margin: 16px 0;
            border: 1px dashed #5f9cea;
        }

        .photo-viewer img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 12px;
        }

        .photo-viewer .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 30px;
            cursor: pointer;
            width: 50px;
            height: 50px;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .photo-viewer .close-btn span {
            color: white !important;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #2b3947;
            border-radius: 10px;
        }
    </style>
</head>
<body class="dark-theme">
    <!-- Модалка авторизации -->
    <div id="authModal" class="auth-modal">
        <div class="auth-card">
            <h2 style="text-align: center; margin-bottom: 20px;">✨ Exogram</h2>
            
            <div class="auth-tabs">
                <div class="auth-tab active" id="loginTab" onclick="switchTab('login')">Вход</div>
                <div class="auth-tab" id="registerTab" onclick="switchTab('register')">Регистрация</div>
            </div>

            <div id="loginForm">
                <input type="email" id="loginEmail" class="auth-input" placeholder="Email" value="test@test.com">
                <input type="password" id="loginPassword" class="auth-input" placeholder="Пароль" value="123456">
                <button class="auth-btn" onclick="handleLogin()"><span>Войти</span></button>
            </div>

            <div id="registerForm" style="display: none;">
                <input type="text" id="regName" class="auth-input" placeholder="Имя">
                <input type="email" id="regEmail" class="auth-input" placeholder="Email">
                <input type="password" id="regPassword" class="auth-input" placeholder="Пароль">
                <button class="auth-btn" onclick="handleRegister()"><span>Создать</span></button>
            </div>

            <div id="authError" style="color: #ff6b6b; text-align: center; margin-top: 10px;"></div>
        </div>
    </div>

    <!-- Меню профиля -->
    <div id="profileMenu" class="profile-menu">
        <div class="profile-menu-card">
            <h3 style="margin-bottom: 20px;">👤 Мой профиль</h3>
            
            <div style="text-align: center; margin-bottom: 20px;">
                <div class="profile-avatar" style="width: 80px; height: 80px; margin: 0 auto;" onclick="openAvatarModal()">
                    <img src="" id="menuAvatarImg" style="display: none;">
                    <span id="menuAvatarText">U</span>
                </div>
            </div>
            
            <div class="profile-menu-item" onclick="editProfileField('name')">
                <i>👤</i> <span id="profileNameDisplay"></span>
            </div>
            <div class="profile-menu-item" onclick="editProfileField('email')">
                <i>📧</i> <span id="profileEmailDisplay"></span>
            </div>
            <div class="profile-menu-item" onclick="editProfileField('phone')">
                <i>📱</i> <span id="profilePhoneDisplay">Не указан</span>
            </div>
            <div class="profile-menu-item" onclick="editProfileField('bio')">
                <i>📝</i> <span id="profileBioDisplay">Не указано</span>
            </div>
            <div class="profile-menu-item" onclick="logout()">
                <i>🚪</i> Выйти
            </div>
        </div>
    </div>

    <!-- Модалка фото -->
    <div id="avatarModal" class="avatar-modal" style="display: none;">
        <div class="avatar-card">
            <h3 style="text-align: center; margin-bottom: 20px;">📸 Фото профиля</h3>
            <div class="avatar-preview" onclick="document.getElementById('avatarInput').click()">
                <img src="" id="previewImage" style="display: none;">
                <div id="previewPlaceholder" style="width: 100%; height: 100%; background: #2b3947; display: flex; align-items: center; justify-content: center; font-size: 40px;">👤</div>
            </div>
            <input type="file" id="avatarInput" class="avatar-input" accept="image/*">
            <label for="avatarInput" class="avatar-label">Выбрать фото</label>
            <button class="auth-btn" onclick="uploadAvatar()" id="uploadBtn"><span>Сохранить</span></button>
            <button class="auth-btn" onclick="closeAvatarModal()" style="background: #2b3947; margin-top: 10px;"><span>Отмена</span></button>
            <div id="uploadError" style="color: #ff6b6b; text-align: center; margin-top: 10px;"></div>
        </div>
    </div>

    <!-- Просмотр фото -->
    <div id="photoViewer" class="photo-viewer" style="display: none;" onclick="closePhotoViewer()">
        <span class="close-btn" onclick="closePhotoViewer(event)"><span>✕</span></span>
        <img id="viewerImage" src="" alt="">
        <div id="viewerName" style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.5); padding: 8px 16px; border-radius: 30px;"></div>
    </div>

    <!-- Основной чат -->
    <div class="exogram-container" id="chatContainer" style="display: none;">
        <!-- Сайдбар -->
        <div class="chats-sidebar">
            <div class="sidebar-header">
                <h3>Exogram</h3>
                <div class="header-icons">
                    <span id="themeToggle" onclick="toggleTheme()">🌙</span>
                    <span onclick="toggleProfileMenu()">☰</span>
                </div>
            </div>
            
            <!-- Профиль -->
            <div class="profile-section" onclick="toggleProfileMenu()">
                <div class="profile-avatar" id="profileAvatar">
                    <img src="" id="profileAvatarImg" style="display: none;">
                    <span id="profileAvatarText">U</span>
                </div>
                <div class="profile-info">
                    <div class="profile-name" id="profileName">Загрузка...</div>
                    <div class="profile-status">Онлайн</div>
                </div>
            </div>

            <div class="chat-list" id="chatList">
                <div class="chat-item">
                    <div class="chat-avatar"><span>👥</span></div>
                    <div class="chat-info">
                        <div class="chat-name">Общий чат</div>
                        <div class="chat-last">Все участники</div>
                    </div>
                    <div class="chat-item-menu-btn" onclick="event.stopPropagation(); toggleChatMenu(this)"><span>⋮</span></div>
                    <div class="chat-item-menu">
                        <div class="menu-item" onclick="clearAllMessages()">🗑️ Очистить чат</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Чат -->
        <div class="chat-main">
            <div class="chat-header">
                <div class="chat-header-avatar" onclick="showChatInfo()"><span>👥</span></div>
                <div class="chat-header-info">
                    <div class="chat-header-title">Общий чат</div>
                    <div class="chat-header-status">2 участника онлайн</div>
                </div>
                <div class="chat-header-icons">
                    <span>🔍</span>
                    <span>📞</span>
                </div>
            </div>

            <div class="messages-area" id="messagesArea"></div>

            <div class="input-area">
                <div class="attach-btn" onclick="toggleAttachMenu()">📎</div>
                <div class="attach-menu" id="attachMenu">
                    <div class="attach-option" onclick="sendPhoto()">📷 Отправить фото</div>
                    <div class="attach-option" onclick="clearAllMessages()">🗑️ Очистить чат</div>
                </div>
                <div class="input-wrapper">
                    <input type="text" id="messageInput" placeholder="Сообщение" disabled>
                </div>
                <button class="send-btn" id="sendButton" disabled onclick="sendMessage()"><span>➤</span></button>
            </div>
        </div>
    </div>

    <script>
        // Firebase конфиг
        const firebaseConfig = {
            apiKey: "AIzaSyC52uzvut9hJ4Z_hGA7K8HbM9zdcsRfSLw",
            authDomain: "chat-6ba8e.firebaseapp.com",
            projectId: "chat-6ba8e",
            storageBucket: "chat-6ba8e.firebasestorage.app",
            messagingSenderId: "689091987996",
            appId: "1:689091987996:web:dee2edbb65d87f504a6dd9",
            measurementId: "G-THM716CP12"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let currentUser = null;
        let unsubscribeMessages = null;
        let usersCache = new Map();
        let currentTheme = 'dark';

        // Тема
        window.toggleTheme = function() {
            const body = document.body;
            const themeToggle = document.getElementById('themeToggle');
            
            if (currentTheme === 'dark') {
                body.classList.remove('dark-theme');
                body.classList.add('light-theme');
                themeToggle.textContent = '☀️';
                currentTheme = 'light';
            } else {
                body.classList.remove('light-theme');
                body.classList.add('dark-theme');
                themeToggle.textContent = '🌙';
                currentTheme = 'dark';
            }
            localStorage.setItem('theme', currentTheme);
        };

        // Загрузка темы
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            currentTheme = savedTheme;
            document.body.classList.add(savedTheme + '-theme');
            document.getElementById('themeToggle').textContent = savedTheme === 'dark' ? '🌙' : '☀️';
        }

        // Меню профиля
        window.toggleProfileMenu = function() {
            const menu = document.getElementById('profileMenu');
            menu.classList.toggle('show');
            updateProfileMenu();
        };

        async function updateProfileMenu() {
            if (!currentUser) return;
            
            document.getElementById('profileNameDisplay').textContent = currentUser.displayName || 'Не указано';
            document.getElementById('profileEmailDisplay').textContent = currentUser.email || 'Не указано';
            
            const userDoc = await db.collection('users').doc(currentUser.uid).get();
            if (userDoc.exists) {
                const data = userDoc.data();
                document.getElementById('profilePhoneDisplay').textContent = data.phone || 'Не указан';
                document.getElementById('profileBioDisplay').textContent = data.bio || 'Не указано';
                
                if (data.avatarBase64) {
                    document.getElementById('menuAvatarImg').src = data.avatarBase64;
                    document.getElementById('menuAvatarImg').style.display = 'block';
                    document.getElementById('menuAvatarText').style.display = 'none';
                }
            }
        }

        window.editProfileField = function(field) {
            const currentValue = field === 'name' ? currentUser.displayName : 
                               field === 'email' ? currentUser.email : '';
            
            const newValue = prompt(`Введите новое ${field === 'name' ? 'имя' : field === 'email' ? 'email' : field === 'phone' ? 'телефон' : 'bio'}`, currentValue);
            
            if (newValue && newValue !== currentValue) {
                if (field === 'name') {
                    currentUser.updateProfile({ displayName: newValue });
                    db.collection('users').doc(currentUser.uid).update({ name: newValue });
                } else {
                    db.collection('users').doc(currentUser.uid).update({ [field]: newValue });
                }
                updateProfileMenu();
                updateProfileUI();
            }
        };

        // Меню чата
        window.toggleChatMenu = function(btn) {
            const menu = btn.nextElementSibling;
            menu.classList.toggle('show');
            setTimeout(() => menu.classList.remove('show'), 3000);
        };

        // Меню сообщения
        window.toggleMessageMenu = function(btn, messageId) {
            const menu = btn.nextElementSibling;
            menu.classList.toggle('show');
            menu.setAttribute('data-message-id', messageId);
            setTimeout(() => menu.classList.remove('show'), 3000);
        };

        window.deleteMessage = async function(messageId) {
            if (!confirm('Удалить сообщение?')) return;
            await db.collection('messages').doc(messageId).delete();
        };

        window.editMessage = async function(messageId) {
            const newText = prompt('Изменить сообщение:');
            if (newText) {
                await db.collection('messages').doc(messageId).update({ text: newText });
            }
        };

        // Отправка фото
        window.sendPhoto = function() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async function(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = async function(ev) {
                    const photoUrl = ev.target.result;
                    
                    await db.collection('messages').add({
                        type: 'image',
                        imageUrl: photoUrl,
                        userId: currentUser.uid,
                        userName: currentUser.displayName || 'Пользователь',
                        time: getCurrentTime(),
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                };
                reader.readAsDataURL(file);
            };
            input.click();
            toggleAttachMenu();
        };

        // Очистить все сообщения
        window.clearAllMessages = async function() {
            if (!confirm('⚠️ Удалить ВСЕ сообщения?')) return;
            const snapshot = await db.collection('messages').get();
            const batch = db.batch();
            snapshot.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
        };

        // Остальные функции
        async function ensureUserDocument(user) {
            const userRef = db.collection('users').doc(user.uid);
            const userDoc = await userRef.get();
            
            if (!userDoc.exists) {
                await userRef.set({
                    name: user.displayName || 'Пользователь',
                    email: user.email,
                    avatarBase64: '',
                    phone: '',
                    bio: '',
                    createdAt: new Date()
                });
            }
        }

        window.handleRegister = async function() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            try {
                const result = await auth.createUserWithEmailAndPassword(email, password);
                await result.user.updateProfile({ displayName: name });
                await db.collection('users').doc(result.user.uid).set({
                    name: name,
                    email: email,
                    avatarBase64: '',
                    phone: '',
                    bio: '',
                    createdAt: new Date()
                });
                currentUser = result.user;
                hideAuthModal();
                initChat();
            } catch (error) {
                document.getElementById('authError').textContent = error.message;
            }
        };

        window.handleLogin = async function() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const result = await auth.signInWithEmailAndPassword(email, password);
                currentUser = result.user;
                await ensureUserDocument(currentUser);
                hideAuthModal();
                initChat();
            } catch (error) {
                document.getElementById('authError').textContent = 'Неверный email или пароль';
            }
        };

        window.logout = async function() {
            await auth.signOut();
            currentUser = null;
            document.getElementById('chatContainer').style.display = 'none';
            document.getElementById('authModal').style.display = 'flex';
            document.getElementById('profileMenu').classList.remove('show');
            if (unsubscribeMessages) unsubscribeMessages();
        };

        window.openAvatarModal = function() {
            document.getElementById('avatarModal').style.display = 'flex';
        };

        window.closeAvatarModal = function() {
            document.getElementById('avatarModal').style.display = 'none';
        };

        window.uploadAvatar = async function() {
            const file = document.getElementById('avatarInput').files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function(e) {
                await db.collection('users').doc(currentUser.uid).update({ 
                    avatarBase64: e.target.result 
                });
                await updateProfileUI();
                closeAvatarModal();
                alert('✅ Фото сохранено!');
            };
            reader.readAsDataURL(file);
        };

        window.showPhoto = function(url, name) {
            document.getElementById('viewerImage').src = url;
            document.getElementById('viewerName').textContent = name;
            document.getElementById('photoViewer').style.display = 'flex';
        };

        window.closePhotoViewer = function() {
            document.getElementById('photoViewer').style.display = 'none';
        };

        async function updateProfileUI() {
            if (!currentUser) return;
            
            document.getElementById('profileName').textContent = currentUser.displayName || 'User';
            
            const userDoc = await db.collection('users').doc(currentUser.uid).get();
            const userData = userDoc.data();
            
            if (userData?.avatarBase64) {
                document.getElementById('profileAvatarImg').src = userData.avatarBase64;
                document.getElementById('profileAvatarImg').style.display = 'block';
                document.getElementById('profileAvatarText').style.display = 'none';
            }
        }

        async function getUserData(userId) {
            if (usersCache.has(userId)) return usersCache.get(userId);
            
            const doc = await db.collection('users').doc(userId).get();
            if (doc.exists) {
                usersCache.set(userId, doc.data());
                return doc.data();
            }
            return null;
        }

        function subscribeToMessages() {
            if (unsubscribeMessages) unsubscribeMessages();

            unsubscribeMessages = db.collection('messages')
                .orderBy('timestamp', 'asc')
                .onSnapshot(async (snapshot) => {
                    const area = document.getElementById('messagesArea');
                    area.innerHTML = '';
                    
                    for (const doc of snapshot.docs) {
                        const msg = { id: doc.id, ...doc.data() };
                        await displayMessage(msg);
                    }
                    area.scrollTop = area.scrollHeight;
                });
        }

        async function displayMessage(msg) {
            if (!msg.text && !msg.imageUrl) return;
            
            const isOutgoing = msg.userId === currentUser?.uid;
            const userData = await getUserData(msg.userId);
            
            const row = document.createElement('div');
            row.className = `message-row ${isOutgoing ? 'outgoing' : 'incoming'}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            if (userData?.avatarBase64) {
                const img = document.createElement('img');
                img.src = userData.avatarBase64;
                img.onclick = () => showPhoto(userData.avatarBase64, userData.name);
                avatar.appendChild(img);
            } else {
                const span = document.createElement('span');
                span.textContent = (userData?.name || 'U')[0].toUpperCase();
                avatar.appendChild(span);
            }
            
            const content = document.createElement('div');
            content.className = 'message-content';
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            
            if (!isOutgoing) {
                const sender = document.createElement('div');
                sender.className = 'message-sender';
                sender.textContent = userData?.name || 'Пользователь';
                sender.onclick = () => userData?.avatarBase64 && showPhoto(userData.avatarBase64, userData.name);
                bubble.appendChild(sender);
            }
            
            if (msg.imageUrl) {
                const img = document.createElement('img');
                img.src = msg.imageUrl;
                img.className = 'message-image';
                img.onclick = () => showPhoto(msg.imageUrl, 'Фото');
                bubble.appendChild(img);
            }
            
            if (msg.text) {
                const text = document.createElement('div');
                text.className = 'message-text';
                text.textContent = msg.text;
                bubble.appendChild(text);
            }
            
            const footer = document.createElement('div');
            footer.className = 'message-footer';
            footer.innerHTML = `${msg.time || getCurrentTime()} ${isOutgoing ? '✓✓' : ''}`;
            bubble.appendChild(footer);
            
            content.appendChild(bubble);
            
            if (isOutgoing) {
                const menuBtn = document.createElement('div');
                menuBtn.className = 'message-actions-btn';
                menuBtn.innerHTML = '<span>⋮</span>';
                menuBtn.onclick = (e) => {
                    e.stopPropagation();
                    toggleMessageMenu(menuBtn, msg.id);
                };
                
                const menu = document.createElement('div');
                menu.className = 'message-actions-menu';
                menu.innerHTML = `
                    <div class="menu-item" onclick="editMessage('${msg.id}')">✏️ Изменить</div>
                    <div class="menu-item" onclick="deleteMessage('${msg.id}')">🗑️ Удалить</div>
                `;
                
                content.appendChild(menuBtn);
                content.appendChild(menu);
            }
            
            row.appendChild(avatar);
            row.appendChild(content);
            document.getElementById('messagesArea').appendChild(row);
        }

        window.sendMessage = async function() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentUser) return;

            await db.collection('messages').add({
                text: text,
                userId: currentUser.uid,
                userName: currentUser.displayName || 'Пользователь',
                time: getCurrentTime(),
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            input.value = '';
        };

        function getCurrentTime() {
            return new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
        }

        function switchTab(tab) {
            if (tab === 'login') {
                document.getElementById('loginTab').classList.add('active');
                document.getElementById('registerTab').classList.remove('active');
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
            } else {
                document.getElementById('registerTab').classList.add('active');
                document.getElementById('loginTab').classList.remove('active');
                document.getElementById('registerForm').style.display = 'block';
                document.getElementById('loginForm').style.display = 'none';
            }
        }

        function hideAuthModal() {
            document.getElementById('authModal').style.display = 'none';
            document.getElementById('chatContainer').style.display = 'flex';
        }

        function toggleAttachMenu() {
            document.getElementById('attachMenu').classList.toggle('show');
        }

        async function initChat() {
            document.getElementById('messageInput').disabled = false;
            document.getElementById('sendButton').disabled = false;
            
            await ensureUserDocument(currentUser);
            await updateProfileUI();
            subscribeToMessages();
        }

        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.profile-section') && !e.target.closest('#profileMenu')) {
                document.getElementById('profileMenu').classList.remove('show');
            }
        });

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                await ensureUserDocument(user);
                hideAuthModal();
                initChat();
            }
        });
    </script>
</body>
</html>
