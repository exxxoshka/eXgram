<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exogram · Telegram Premium Clone</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #0e1621;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Главный контейнер */
        .exogram-container {
            width: 100%;
            height: 100vh;
            display: flex;
            background: #17212b;
            overflow: hidden;
        }

        /* Сайдбар */
        .chats-sidebar {
            width: 340px;
            background: #17212b;
            border-right: 1px solid #0f1a24;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 16px 20px;
            background: #1e2b36;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-header h3 {
            color: white;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #5f9cea, #9f7aea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-icons {
            display: flex;
            gap: 18px;
            color: #6e7b8a;
            font-size: 22px;
        }

        .profile-section {
            padding: 16px;
            background: #1e2b36;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .profile-section:hover {
            background: #2b3947;
        }

        .profile-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2e7eb0, #4e9ad0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            color: white;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-avatar-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 10px;
            text-align: center;
            padding: 2px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .profile-avatar:hover .profile-avatar-overlay {
            opacity: 1;
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            color: white;
            font-weight: 600;
            font-size: 16px;
        }

        .profile-status {
            color: #6e7b8a;
            font-size: 13px;
        }

        .search-box {
            padding: 8px 12px;
            margin: 8px 12px;
            background: #242f3d;
            border-radius: 30px;
            display: flex;
            align-items: center;
            color: #6e7b8a;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: white;
            margin-left: 10px;
            flex: 1;
            outline: none;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            border-bottom: 1px solid #1e2b36;
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
        }

        .chat-item:hover {
            background: #1e2b36;
        }

        .chat-item.active {
            background: #2b3947;
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2e7eb0, #4e9ad0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
            overflow: hidden;
        }

        .chat-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .chat-last {
            font-size: 13px;
            color: #6e7b8a;
        }

        /* Основной чат */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0e1621;
        }

        .chat-header {
            padding: 12px 24px;
            background: #17212b;
            border-bottom: 1px solid #0f1a24;
            display: flex;
            align-items: center;
            gap: 16px;
            color: white;
        }

        .chat-header-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2e7eb0, #4e9ad0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            overflow: hidden;
        }

        .chat-header-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .chat-header-status {
            font-size: 13px;
            color: #6e7b8a;
        }

        .chat-header-icons {
            display: flex;
            gap: 24px;
            color: #6e7b8a;
            font-size: 22px;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px 40px;
            background: #0e1621;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60"><circle cx="30" cy="30" r="1" fill="%232b3947" opacity="0.3"/></svg>');
        }

        .message-row {
            display: flex;
            margin-bottom: 16px;
            position: relative;
            group: true;
        }

        .message-row:hover .message-actions {
            opacity: 1;
        }

        .message-actions {
            position: absolute;
            right: 0;
            top: 0;
            background: #17212b;
            border-radius: 20px;
            padding: 4px;
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 10;
        }

        .message-action-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: #2b3947;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: background 0.2s;
        }

        .message-action-btn:hover {
            background: #3e4c5a;
        }

        .message-action-btn.delete {
            color: #ff6b6b;
        }

        .message-action-btn.delete:hover {
            background: #4a1b1b;
        }

        .message-row.outgoing {
            justify-content: flex-end;
        }

        .bubble {
            max-width: 60%;
            padding: 10px 14px 8px 14px;
            border-radius: 14px;
            position: relative;
            word-wrap: break-word;
        }

        .incoming .bubble {
            background: #17212b;
            color: white;
            border-top-left-radius: 4px;
        }

        .outgoing .bubble {
            background: #2b3947;
            color: white;
            border-top-right-radius: 4px;
        }

        .message-sender {
            font-size: 12px;
            font-weight: 600;
            color: #5f9cea;
            margin-bottom: 4px;
        }

        .message-text {
            font-size: 15px;
            line-height: 1.4;
        }

        .message-footer {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 6px;
            margin-top: 4px;
            font-size: 11px;
            color: #6e7b8a;
        }

        .outgoing .message-footer {
            color: #8e9bb5;
        }

        .input-area {
            padding: 16px 24px;
            background: #17212b;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .attach-btn {
            color: #6e7b8a;
            font-size: 26px;
            transform: rotate(45deg);
            cursor: pointer;
            position: relative;
        }

        .attach-menu {
            position: absolute;
            bottom: 60px;
            left: 20px;
            background: #17212b;
            border-radius: 16px;
            padding: 8px;
            display: none;
            flex-direction: column;
            gap: 4px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .attach-menu.show {
            display: flex;
        }

        .attach-option {
            padding: 12px 24px;
            color: white;
            cursor: pointer;
            border-radius: 12px;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .attach-option:hover {
            background: #2b3947;
        }

        .input-wrapper {
            flex: 1;
            background: #1e2b36;
            border-radius: 30px;
            padding: 10px 18px;
            display: flex;
            align-items: center;
        }

        #messageInput {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 15px;
        }

        #messageInput::placeholder {
            color: #6e7b8a;
        }

        .emoji-btn, .voice-btn {
            color: #6e7b8a;
            font-size: 24px;
            margin: 0 4px;
            cursor: pointer;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #5f9cea;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .send-btn:hover {
            background: #4a8ad4;
        }

        /* Модальное окно авторизации */
        .auth-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .auth-card {
            background: #17212b;
            border-radius: 24px;
            padding: 32px;
            width: 400px;
            color: white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .auth-card h2 {
            font-size: 32px;
            margin-bottom: 8px;
            text-align: center;
            background: linear-gradient(135deg, #5f9cea, #9f7aea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-subtitle {
            color: #6e7b8a;
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-tabs {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            border-bottom: 1px solid #1e2b36;
            padding-bottom: 16px;
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            cursor: pointer;
            border-radius: 12px;
            transition: background 0.2s;
            font-weight: 600;
        }

        .auth-tab.active {
            background: #1e2b36;
            color: #5f9cea;
        }

        .auth-input {
            width: 100%;
            padding: 16px;
            background: #1e2b36;
            border: 1px solid #2b3947;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            margin-bottom: 16px;
            outline: none;
        }

        .auth-input:focus {
            border-color: #5f9cea;
        }

        .auth-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #5f9cea, #9f7aea);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 8px;
        }

        .auth-btn:hover {
            transform: scale(1.02);
        }

        .auth-error {
            color: #ff6b6b;
            font-size: 14px;
            margin-top: 8px;
            text-align: center;
        }

        /* Модалка фото профиля */
        .avatar-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1100;
        }

        .avatar-card {
            background: #17212b;
            border-radius: 24px;
            padding: 32px;
            width: 400px;
            color: white;
        }

        .avatar-preview {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 20px auto;
            overflow: hidden;
            border: 3px solid #5f9cea;
        }

        .avatar-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-input {
            display: none;
        }

        .avatar-label {
            display: block;
            padding: 16px;
            background: #1e2b36;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            margin: 16px 0;
            border: 1px dashed #5f9cea;
        }

        .avatar-label:hover {
            background: #2b3947;
        }

        /* Скроллбар */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #2b3947;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #3e4c5a;
        }
    </style>
</head>
<body>
    <!-- Модалка авторизации -->
    <div id="authModal" class="auth-modal">
        <div class="auth-card">
            <h2>✨ Exogram</h2>
            <div class="auth-subtitle">Войдите в премиальный чат</div>
            
            <div class="auth-tabs">
                <div class="auth-tab active" id="loginTab" onclick="switchTab('login')">Вход</div>
                <div class="auth-tab" id="registerTab" onclick="switchTab('register')">Регистрация</div>
            </div>

            <div id="loginForm">
                <input type="email" id="loginEmail" class="auth-input" placeholder="Email" value="test@exogram.com">
                <input type="password" id="loginPassword" class="auth-input" placeholder="Пароль" value="123456">
                <button class="auth-btn" onclick="handleLogin()">Войти в Exogram</button>
            </div>

            <div id="registerForm" style="display: none;">
                <input type="text" id="regName" class="auth-input" placeholder="Ваше имя">
                <input type="email" id="regEmail" class="auth-input" placeholder="Email">
                <input type="password" id="regPassword" class="auth-input" placeholder="Пароль (минимум 6 символов)">
                <button class="auth-btn" onclick="handleRegister()">Создать аккаунт</button>
            </div>

            <div id="authError" class="auth-error"></div>
        </div>
    </div>

    <!-- Модалка фото профиля -->
    <div id="avatarModal" class="avatar-modal">
        <div class="avatar-card">
            <h3 style="text-align: center; margin-bottom: 20px;">📸 Фото профиля</h3>
            <div class="avatar-preview" id="avatarPreview">
                <img src="" id="previewImage" alt="Preview">
            </div>
            <input type="file" id="avatarInput" class="avatar-input" accept="image/*">
            <label for="avatarInput" class="avatar-label">Выбрать фото</label>
            <button class="auth-btn" onclick="uploadAvatar()" style="margin-top: 0;">Сохранить</button>
            <button class="auth-btn" onclick="closeAvatarModal()" style="background: #2b3947; margin-top: 10px;">Отмена</button>
        </div>
    </div>

    <!-- Основной чат -->
    <div class="exogram-container" id="chatContainer" style="display: none;">
        <!-- Сайдбар -->
        <div class="chats-sidebar">
            <div class="sidebar-header">
                <h3>Exogram</h3>
                <div class="header-icons">
                    <span>✨</span>
                    <span>🌙</span>
                </div>
            </div>
            
            <!-- Профиль пользователя -->
            <div class="profile-section" onclick="openAvatarModal()">
                <div class="profile-avatar" id="profileAvatar">
                    <img src="" id="profileAvatarImg" style="display: none;">
                    <span id="profileAvatarText">U</span>
                    <div class="profile-avatar-overlay">Изменить</div>
                </div>
                <div class="profile-info">
                    <div class="profile-name" id="profileName">Загрузка...</div>
                    <div class="profile-status">✨ Premium</div>
                </div>
                <div style="color: #6e7b8a;" onclick="event.stopPropagation(); logout()">🚪</div>
            </div>
            
            <div class="search-box">
                <span>🔍</span>
                <input type="text" placeholder="Поиск в Exogram">
            </div>

            <div class="chat-list" id="chatList"></div>
        </div>

        <!-- Основной чат -->
        <div class="chat-main">
            <div class="chat-header">
                <div class="chat-header-avatar" id="currentChatAvatar">Г</div>
                <div class="chat-header-info">
                    <div class="chat-header-title">Общий чат Exogram</div>
                    <div class="chat-header-status" id="onlineStatus">премиум сообщения</div>
                </div>
                <div class="chat-header-icons">
                    <span>🔍</span>
                    <span>📞</span>
                    <span>⋮</span>
                </div>
            </div>

            <div class="messages-area" id="messagesArea"></div>

            <div class="input-area">
                <div class="attach-btn" onclick="toggleAttachMenu()">📎</div>
                <div class="attach-menu" id="attachMenu">
                    <div class="attach-option" onclick="clearAllMessages()">🗑️ Очистить все</div>
                    <div class="attach-option" onclick="deleteMyMessages()">📝 Удалить мои</div>
                </div>
                <div class="input-wrapper">
                    <input type="text" id="messageInput" placeholder="Сообщение в Exogram">
                    <span class="emoji-btn">😊</span>
                    <span class="voice-btn">🎤</span>
                </div>
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <script>
        // Firebase конфиг
        const firebaseConfig = {
            apiKey: "AIzaSyC52uzvut9hJ4Z_hGA7K8HbM9zdcsRfSLw",
            authDomain: "chat-6ba8e.firebaseapp.com",
            projectId: "chat-6ba8e",
            storageBucket: "chat-6ba8e.firebasestorage.app",
            messagingSenderId: "689091987996",
            appId: "1:689091987996:web:dee2edbb65d87f504a6dd9",
            measurementId: "G-THM716CP12"
        };

        // Инициализация
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const storage = firebase.storage();

        let currentUser = null;
        let unsubscribeMessages = null;
        let selectedFile = null;

        // Переключение табов
        window.switchTab = function(tab) {
            if (tab === 'login') {
                document.getElementById('loginTab').classList.add('active');
                document.getElementById('registerTab').classList.remove('active');
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
            } else {
                document.getElementById('registerTab').classList.add('active');
                document.getElementById('loginTab').classList.remove('active');
                document.getElementById('registerForm').style.display = 'block';
                document.getElementById('loginForm').style.display = 'none';
            }
        };

        // Регистрация
        window.handleRegister = async function() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            if (!name || !email || !password) {
                showAuthError('Заполните все поля');
                return;
            }

            if (password.length < 6) {
                showAuthError('Пароль должен быть минимум 6 символов');
                return;
            }

            try {
                const result = await auth.createUserWithEmailAndPassword(email, password);
                await result.user.updateProfile({ displayName: name });
                
                await db.collection('users').doc(result.user.uid).set({
                    name: name,
                    email: email,
                    avatar: '',
                    createdAt: new Date()
                });

                currentUser = result.user;
                hideAuthModal();
                initChat();
            } catch (error) {
                showAuthError(error.message);
            }
        };

        // Вход
        window.handleLogin = async function() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const result = await auth.signInWithEmailAndPassword(email, password);
                currentUser = result.user;
                hideAuthModal();
                initChat();
            } catch (error) {
                showAuthError('Неверный email или пароль');
            }
        };

        // Выход
        window.logout = async function() {
            await auth.signOut();
            currentUser = null;
            document.getElementById('chatContainer').style.display = 'none';
            document.getElementById('authModal').style.display = 'flex';
            
            if (unsubscribeMessages) {
                unsubscribeMessages();
            }
        };

        // Модалка фото
        window.openAvatarModal = function() {
            document.getElementById('avatarModal').style.display = 'flex';
        };

        window.closeAvatarModal = function() {
            document.getElementById('avatarModal').style.display = 'none';
            selectedFile = null;
        };

        // Выбор фото
        document.getElementById('avatarInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                selectedFile = file;
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('previewImage').src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        // Загрузка фото
        window.uploadAvatar = async function() {
            if (!selectedFile || !currentUser) return;

            try {
                const storageRef = storage.ref(`avatars/${currentUser.uid}`);
                await storageRef.put(selectedFile);
                const url = await storageRef.getDownloadURL();
                
                await currentUser.updateProfile({ photoURL: url });
                await db.collection('users').doc(currentUser.uid).update({ avatar: url });
                
                updateProfileUI();
                closeAvatarModal();
            } catch (error) {
                console.error('Avatar upload error:', error);
            }
        };

        // Обновление UI профиля
        function updateProfileUI() {
            if (!currentUser) return;
            
            document.getElementById('profileName').textContent = currentUser.displayName || 'User';
            
            const avatarImg = document.getElementById('profileAvatarImg');
            const avatarText = document.getElementById('profileAvatarText');
            
            if (currentUser.photoURL) {
                avatarImg.src = currentUser.photoURL;
                avatarImg.style.display = 'block';
                avatarText.style.display = 'none';
            } else {
                avatarImg.style.display = 'none';
                avatarText.style.display = 'block';
                avatarText.textContent = (currentUser.displayName || 'U')[0];
            }
        }

        // Инициализация чата
        function initChat() {
            updateProfileUI();
            loadUsers();
            subscribeToMessages();
        }

        // Загрузка пользователей
        async function loadUsers() {
            const chatList = document.getElementById('chatList');
            
            let html = `
                <div class="chat-item active">
                    <div class="chat-avatar">
                        ${currentUser.photoURL ? 
                            `<img src="${currentUser.photoURL}">` : 
                            (currentUser.displayName?.[0] || 'U')}
                    </div>
                    <div class="chat-info">
                        <div class="chat-name">${currentUser.displayName || 'User'} (вы)</div>
                        <div class="chat-last">✨ Премиум статус</div>
                    </div>
                </div>
            `;

            const snapshot = await db.collection('users').get();
            snapshot.forEach(doc => {
                if (doc.id !== currentUser.uid) {
                    const user = doc.data();
                    html += `
                        <div class="chat-item">
                            <div class="chat-avatar">
                                ${user.avatar ? `<img src="${user.avatar}">` : (user.name?.[0] || 'U')}
                            </div>
                            <div class="chat-info">
                                <div class="chat-name">${user.name}</div>
                                <div class="chat-last">Нажмите чтобы начать</div>
                            </div>
                        </div>
                    `;
                }
            });

            chatList.innerHTML = html;
        }

        // Подписка на сообщения
        function subscribeToMessages() {
            if (unsubscribeMessages) {
                unsubscribeMessages();
            }

            unsubscribeMessages = db.collection('messages')
                .orderBy('timestamp', 'asc')
                .onSnapshot((snapshot) => {
                    document.getElementById('messagesArea').innerHTML = '';
                    
                    snapshot.forEach((doc) => {
                        const msg = { id: doc.id, ...doc.data() };
                        displayMessage(msg);
                    });

                    const messagesArea = document.getElementById('messagesArea');
                    messagesArea.scrollTop = messagesArea.scrollHeight;
                });
        }

        // Отображение сообщения
        function displayMessage(msg) {
            if (!msg.text) return;
            
            const isOutgoing = msg.userId === currentUser?.uid;
            
            const messageRow = document.createElement('div');
            messageRow.className = `message-row ${isOutgoing ? 'outgoing' : 'incoming'}`;
            messageRow.setAttribute('data-message-id', msg.id);
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            
            if (!isOutgoing) {
                const senderDiv = document.createElement('div');
                senderDiv.className = 'message-sender';
                senderDiv.textContent = msg.userName || 'Пользователь';
                bubble.appendChild(senderDiv);
            }
            
            const textDiv = document.createElement('div');
            textDiv.className = 'message-text';
            textDiv.textContent = msg.text;
            bubble.appendChild(textDiv);
            
            const footer = document.createElement('div');
            footer.className = 'message-footer';
            footer.innerHTML = `${msg.time || getCurrentTime()} ${isOutgoing ? '✓✓' : ''}`;
            bubble.appendChild(footer);
            
            // Кнопки действий
            const actions = document.createElement('div');
            actions.className = 'message-actions';
            
            if (isOutgoing) {
                actions.innerHTML += `
                    <button class="message-action-btn delete" onclick="deleteMessage('${msg.id}')">🗑️</button>
                `;
            }
            
            if (currentUser?.uid === 'admin' || isOutgoing) {
                actions.innerHTML += `
                    <button class="message-action-btn" onclick="editMessage('${msg.id}', '${msg.text}')">✏️</button>
                `;
            }
            
            messageRow.appendChild(actions);
            messageRow.appendChild(bubble);
            document.getElementById('messagesArea').appendChild(messageRow);
        }

        // Удалить сообщение
        window.deleteMessage = async function(messageId) {
            if (!confirm('Удалить сообщение?')) return;
            
            try {
                await db.collection('messages').doc(messageId).delete();
            } catch (error) {
                console.error('Delete error:', error);
            }
        };

        // Очистить все сообщения
        window.clearAllMessages = async function() {
            if (!confirm('⚠️ Удалить ВСЕ сообщения? Это действие необратимо!')) return;
            
            try {
                const snapshot = await db.collection('messages').get();
                const batch = db.batch();
                snapshot.forEach(doc => {
                    batch.delete(doc.ref);
                });
                await batch.commit();
                toggleAttachMenu();
            } catch (error) {
                console.error('Clear all error:', error);
            }
        };

        // Удалить мои сообщения
        window.deleteMyMessages = async function() {
            if (!confirm('Удалить только ваши сообщения?')) return;
            
            try {
                const snapshot = await db.collection('messages')
                    .where('userId', '==', currentUser.uid)
                    .get();
                    
                const batch = db.batch();
                snapshot.forEach(doc => {
                    batch.delete(doc.ref);
                });
                await batch.commit();
                toggleAttachMenu();
            } catch (error) {
                console.error('Delete my error:', error);
            }
        };

        // Тоггл меню
        window.toggleAttachMenu = function() {
            const menu = document.getElementById('attachMenu');
            menu.classList.toggle('show');
            
            setTimeout(() => {
                menu.classList.remove('show');
            }, 3000);
        };

        // Отправка сообщения
        window.sendMessage = async function() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text || !currentUser) return;

            try {
                await db.collection('messages').add({
                    text: text,
                    userId: currentUser.uid,
                    userName: currentUser.displayName || 'Пользователь',
                    time: getCurrentTime(),
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                input.value = '';
            } catch (error) {
                console.error('Send error:', error);
            }
        };

        // Получение времени
        function getCurrentTime() {
            return new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
        }

        // Показать ошибку
        function showAuthError(message) {
            document.getElementById('authError').textContent = message;
        }

        // Скрыть модалку
        function hideAuthModal() {
            document.getElementById('authModal').style.display = 'none';
            document.getElementById('chatContainer').style.display = 'flex';
        }

        // Enter для отправки
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Проверка авторизации
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                hideAuthModal();
                initChat();
            }
        });

        // Авто-заполнение для демо
        window.onload = function() {
            document.getElementById('regName').value = 'Премиум';
            document.getElementById('regEmail').value = 'premium' + Math.floor(Math.random()*1000) + '@exogram.com';
            document.getElementById('regPassword').value = '123456';
        };
    </script>
</body>
</html>
